name: Update Oracle Node

on:
  push:
    paths:
      - 'best.txt' # 當 best.txt 發生變動時觸發
  workflow_dispatch: # 新增：允許手動點擊按鈕觸發測試

jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予 Action 寫入倉庫的權限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update oracle.txt
        run: |
          # 1. 檢查文件是否存在
          if [ ! -f "best.txt" ] || [ ! -f "oracle.txt" ]; then
            echo "文件缺失，跳過執行"
            exit 0
          fi

          # 2. 刪除 oracle.txt 的最後一行 (sed -i '$d' 是精準刪除最後一行的指令)
          sed -i '$d' oracle.txt

          # 3. 將 best.txt 的內容追加到 oracle.txt
          # 使用 echo 確保追加前換行，避免節點文字擠在一起
          echo "" >> oracle.txt
          cat best.txt >> oracle.txt

          # 4. 清理多餘的空行，保持文件整潔
          sed -i '/^$/d' oracle.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add oracle.txt
          
          # 檢查是否有實際內容變化，避免空提交
          if git diff --staged --quiet; then
            echo "內容無變化，無需提交"
          else
            git commit -m "手動/自動更新節點: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
